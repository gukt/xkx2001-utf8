# ===== 层1 事件规则 =====
rules:
  # 规则1：enter dong 命令的基础前置检查 -> deny
  # 对应 LPC do_enter: if (me->query_temp("exit_blocked")) deny; if (me->query("rided")) deny; if (busy||fighting) deny
  # 层1 可表达前置 deny 条件，但 do_enter 的实际移动逻辑（move + 跨房间消息）属层3。
  # 此处仅转译 deny 前置条件，action 主体（move 到 /d/gaibang/inhole）标层3。
  - id: guangchang_enter_dong_prereq
    event: command_enter
    command_args: dong
    condition:
      any:
        - kind: has_flag
          flag: exit_blocked
        - kind: has_flag
          flag: rided
        - kind: has_flag
          flag: busy
        - kind: has_flag
          flag: fighting
    action: deny
    priority: 0
    messages:
      exit_blocked: 你正忙着挡住别人的出路呢！
      rided: 骑着东西钻洞？！
      busy_fighting: 你正忙着呢！

# ===== 层3 逃生舱项 =====
# 以下语义单元需图灵完备逻辑（call_out 闭包 + 循环 + 随机 + 跨房间 load_object + NPC 状态复制），
# 无法用层0-2 表达，标层3。

# layer3-escape: init 红镖扒手随机事件--interactive 玩家进入时，条件 has_temp(biao/zhu)+present(hong biao)+random(3)==1
#                触发扒手动作，内含嵌套 random(combat_exp) 比较、destruct 物品、set_temp 多标记、分支消息。
#                嵌套随机 + 物品销毁 + 多标记副作用，超出层1 谓词->action 表达力。
# layer3-escape: init maskman 随机触发--random(10)==5 && !target_found 时 call_out(determine_target,1) + set(target_found)。
#                概率触发 + call_out 延时 + 状态标记，属层3。
# layer3-escape: init add_action("do_enter","enter")--动态注册自定义命令 enter，层1 无 add_action 维度，需层3。
# layer3-escape: do_enter 钻洞移动--arg=="dong" 时 move 玩家到 /d/gaibang/inhole + 跨房间双消息。
#                命令处理 + 玩家跨房间移动 + 双房间消息，超出层1。前置 deny 条件已层1化（见上），主体移动层3。
# layer3-escape: is_suitable + copyvictim + determine_target + resume_targeting maskman 目标搜索与技能复制系统--
#                determine_target 含 while 双层循环 + random 选房间 + load_object 跨房间 + all_inventory 遍历 +
#                is_suitable 多条件筛选 + copyvictim switch(4) 大分支复制技能/装备/属性 + call_out 链
#                (determine_target 1200s 周期 + resume_targeting 900s)。完整状态机 + 循环 + 随机 + 跨房间 +
#                NPC 属性动态复制 + call_out 闭包链，典型层3。
# layer3-escape: create() call_out("determine_target",50) 启动延时--create 即 call_out 启动 maskman 周期任务，
#                50s 后首次执行，属层3 call_out 闭包启动点。
