# 转译自 /Users/gukt/github/xkx2001-utf8/d/death/gate.c
# basename: d_death_gate
# 鬼门关（阴间入口，themed 治理）。create() 纯数据（层0）。
# init() 强制净化：遍历 all_inventory 破坏所有非 character 物品 + clear_condition +
#   清除 sanxiao/smile 临时标记 + add_action(suicide)。这是阴间入口的平台级强制逻辑，
#   themed 治理平台代码，标层3。
# do_suicide()：themed 治理（阴间禁止再自杀），标层3。
# 语义单元 5 个：short / long / exits+objects / no_fight+cost / init / do_suicide
# 层归属：层0=4  层1=0  层2=0  层3=2
id: d/death/gate
short: 鬼门关   # LPC 用 HIW 颜色包裹，转译去 ANSI
long: |
  这里就是著名的阴间入口「鬼门关」，在你面前矗立著一座高大的
  黑色城楼，许多亡魂正哭哭啼啼地列队前进，因为一进鬼门关就无法再
  回阳间了。
exits:
  north: /d/death/gateway
objects:
  d/death/npc/wgargoyle: 1
no_fight: 1
cost: 0

# 层3 项（themed 治理平台代码，不进 UGC DSL）
# layer3-escape: init() -- 阴间入口强制净化：all_inventory 遍历 destruct 所有非 character
#   物品（剥夺亡魂阳间物品）+me->clear_condition()（清状态）+清除 sanxiao/smile 临时标记
#   （跨房间状态清理）+add_action("do_suicide","suicide")。
#   themed 治理平台代码（阴间入口强制净化），层3。
# layer3-escape: do_suicide(arg) -- 阴间禁止再自杀：tell_object 提示"你还死着呢"。
#   themed 治理平台代码（阴间生死状态约束），层3。
