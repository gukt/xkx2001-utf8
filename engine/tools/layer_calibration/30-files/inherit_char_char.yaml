# 转译自 /Users/gukt/github/xkx2001-utf8/inherit/char/char.c
# basename: inherit_char_char
# 角色基类：heart_beat 七步管线核心，引擎侧。几乎全为层3（平台代码=ECS System）。
# 语义单元 6 个
# 层归属：层0=1  层1=0  层2=0  层3=5
id: inherit/char/char

# ──────────── 层0：静态声明 ────────────
# inherit 声明：角色基类聚合 17 个 feature 模块
inherits:
  - F_ACTION
  - F_ALIAS
  - F_APPRENTICE
  - F_ATTACK
  - F_ATTRIBUTE
  - F_COMMAND
  - F_CONDITION
  - F_DAMAGE
  - F_DBASE
  - F_EDIT
  - F_FINANCE
  - F_MARRY
  - F_MESSAGE
  - F_MORE
  - F_MOVE
  - F_NAME
  - F_SKILL
  - F_TEAM

# ──────────── 层3：角色基类核心逻辑 ────────────
# layer3-escape: create() seteuid(0) 允许 LOGIN_D 导出 uid，
#   生命周期初始化逻辑
# layer3-escape: is_character() 返回 1，类型标识函数（简单但属引擎平台接口）
# layer3-escape: setup() 角色从 create 阶段进入运行阶段的转换点，
#   seteuid(getuid) + set_heart_beat(1) + tick=5+random(10) + enable_player +
#   CHAR_D->setup_char，多步副作用交织的过程逻辑
# layer3-escape: heart_beat() 七步管线核心循环（char.c:60-169），
#   (1) 频道清理 (2) 属性封顶 (3) 濒死检查 (4) 昏迷/死亡检查
#   (5) 战斗行动（wimpy+attack） (6) NPC chat (7) tick 衰减条件更新+自愈+空闲心跳关闭，
#   前四步可提前 return，步骤 6 chat 可能 destruct(this_object)，
#   tick=5+random(10) 非均匀周期，七步顺序不可重排，
#   架构不变量：tick=1s + compute<100ms + 非均匀 tick
# layer3-escape: visible(ob) 可见性判定，
#   wizard 等级比较 + env/invisibility 检查 + ghost/astral_vision 分支，
#   过程逻辑
