# 转译自 /Users/gukt/github/xkx2001-utf8/d/forest/foot.c
# basename: d_forest_foot
# 摩天崖山脚。create() 纯数据（层0）；valid_leave(up) 是 wizard 权限门禁，
# 形态为 condition->deny（NOT(is_wizard) -> deny），可层1，但当前谓词集无 is_wizard 叶子，
# 需扩展。逻辑形态完全符合层1（单条件->deny，无副作用无状态机）。
# 语义单元 6 个：short / long / exits / item_desc / outdoors+cost / valid_leave
# 层归属：层0=5  层1=1  层2=0  层3=0
id: d/forest/foot
short: 山脚
long: |
  这里是摩天崖的山脚。摩天崖高耸如云，石壁上光秃秃的，没有
  道路。一条铁链(lian)悬在空中。
exits:
  east: d/forest/gate
  up: d/forest/middle
item_desc:
  lian: "可惜，有人已经把它砍断，不能用了。\n"
outdoors: city
cost: 1

# 层1 事件规则
rules:
  - id: motianya_foot_block_up
    event: valid_leave
    dir: up
    condition:
      not:
        kind: is_wizard   # 待扩展谓词：wizardp(me)，对应 LPC wizardp()
    action: deny
    priority: 0
    message: 摩天崖非比寻常，即使你轻功再好，也难以登上。
