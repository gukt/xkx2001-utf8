# 转译自 /Users/gukt/github/xkx2001-utf8/clone/npc/meng-zhu.c
# basename: clone_npc_meng-zhu
# 武林盟主 NPC，具备挑战/继承/复原机制，含 call_out 闭包与 dbase 全量拷贝循环。
# 语义单元 15 个：create_name/long/attrs（层0） / create_skills（层0） /
#   create_weapon_armor（层0） / create_restore_branch（层0） /
#   init_hook（层1） / do_kill（层1） / accept_fight（层1+层3） /
#   chat（层3） / do_copy（层3） / do_recopy（层3） / do_clone（层3） /
#   do_recover（层3） / auto_enable（层3）
# 层归属：层0=4  层1=3  层2=0  层3=8
id: clone/npc/meng-zhu
name: 魏无双
aliases: ["wulin mengzhu", "mengzhu", "zhu"]
title: 武林盟主
gender: 男性
age: 40
attitude: heroism
generation: 0
winner: none
long: |
  他就是雄踞武林，号召天下，威风赫赫的当今武林盟主。
str_: 25
con_: 25
int_: 25
dex_: 25
max_qi: 500
eff_qi: 500
qi: 500
max_jing: 300
jing: 300
neili: 500
max_neili: 500
jiali: 40
shen_type: 0
combat_exp: 500000
no_clean_up: 1
skills:
  force: 100
  unarmed: 100
  sword: 100
  dodge: 100
  parry: 100
weapon: /d/shaolin/obj/changjian
armor: /d/city/obj/cloth
no_get: 1
save_file: /data/npc/meng-zhu
rules:
  # init 钩子：设置 no_get + 环境写入 winner + 注册命令
  - id: mengzhu_init
    event: init
    condition:
      kind: always
    action: set_flag
    flag: no_get
    priority: 0
    # 附带：environment->set("winner", this_object->query("winner"))
    # 附带：add_action recover/kill — 注册命令属层1
  # do_kill：deny kill mengzhu（注释掉的卫兵群攻逻辑略）
  - id: mengzhu_deny_kill
    event: command
    command: kill
    condition:
      all:
        - kind: always
    action: deny
    message: 不可对盟主放肆！
    priority: 0
  # accept_fight 前置条件部分（可表达为谓词的子集）
  - id: mengzhu_accept_fight_guards
    event: accept_fight
    condition:
      any:
        - kind: attr_lt  # winner == ob->query("id") 视为等值判断的取反
          attr: winner
          value: challenger_id
        - kind: has_flag  # wiz_level(this_player()) > 0
          flag: is_wizard
        - kind: has_flag  # me->is_fighting()
          flag: is_fighting
        - kind: has_flag  # me->query_temp("shan/bangzhu")
          flag: shan_bangzhu
    action: deny
    priority: 0
    # deny 消息依分支不同（你跟你自己打什么架 / 巫师不能抢盟主之位 / ...）
# layer3-escape: accept_fight 的通过分支（me->set 多项属性 + set_temp challenger）
#   需多条 set 副作用 + 条件嵌套，谓词只能表达 deny-wins 的前置，通过分支的属性重置
#   需逃生舱。
# layer3-escape: chat() — 挑战判定主循环，含 is_fighting/present 状态机 +
#   qi 百分比计算 + call_out(do_copy,1) 闭包 + command(say/chat) 文本交织副作用，
#   图灵完备状态机。
# layer3-escape: do_copy(me,ob) — generation 递增 + chinese_number 拼接 +
#   ob->set_temp("apply/short") + call_out(do_clone,0) 闭包，状态机式继承流程。
# layer3-escape: do_recopy(me,ob) — 类似 do_copy 但由 recover 命令触发，
#   含多分支 deny + call_out(do_clone,0) 闭包。
# layer3-escape: do_clone(me,ob) — 核心继承逻辑：for 循环删除/拷贝 skills/
#   skill_map/skill_prepare 三套 mapping + for 循环遍历 all_inventory 析构/
#   重新 wield/wear + 从 ob->query_entire_dbase() 批量 set 20+ 属性 +
#   clear_condition + save + environment->set winner，循环+批量副作用+闭包。
# layer3-escape: do_recover() — 反向复原玩家状态：family 双重校验 + for 循环
#   删除/拷贝 skills/maps + skill_learned mapping 构建 + combat_exp 计算 +
#   log_file，循环+多分支+状态机。
# layer3-escape: auto_enable()（来自 auto_enable.h）— 插入排序 sorted_skills +
#   双重 for 遍历 weapon_types/unarmed_types + SKILL_D 查询 + map_skill/
#   prepare_skill 副作用，排序算法+循环+SKILL_D 动态查询。
