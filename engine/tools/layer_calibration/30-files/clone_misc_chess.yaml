# 转译自 /Users/gukt/github/xkx2001-utf8/clone/misc/chess.c
# basename: clone_misc_chess
# 象棋棋盘物品，完整中国象棋实现：棋盘 TABLE 数据 + 7 种棋子走法判定 +
#   将军检测 + 投骰子 + 认输/和局/复盘/存档/部署。
# 语义单元 10 个：create_name_weight（层0） / create_props（层0） /
#   TABLE 棋盘数据（层0） / tossText 骰子数据（层0） /
#   init_add_action（层1） / init_tab（层3） / query_save_file（层0） /
#   do_move（层3） / do_toss（层3） / do_draw（层3） / do_lose（层3） /
#   do_save/do_deploy/do_reset（层3） / do_review（层3） / long 渲染（层3） /
#   do_check 将军检测（层3）
# 层归属：层0=5  层1=1  层2=0  层3=10
id: clone/misc/chess
name: 象棋棋盘
aliases: ["chinese chess board", "board"]
weight: 3000000
max_encumbrance: 0
unit: 张
long: |
  这是一张象棋棋盘。
value: 0
material: wood
no_get: 1
no_drop: 1
no_refresh: 1
save_file_default: DATA_DIR + "cchess/cchess"
save_file_player: DATA_DIR + "cchess/" + player_id[0..0] + "/" + player_id
inherit_item: true
inherit_save: true
# TABLE 棋盘初始数据（20 行 x 17 列，每格 4 元素：[边框字符, 棋子字符, 棋子类型, 阵营]）
# 棋子类型：1=车 2=马 3=相/象 4=仕/士 5=帅/将 6=炮/包 7=兵/卒
# 阵营：1=红方(HIR) 2=蓝方(HIC) 0=空
# 完整 TABLE 数据见 LPC 源文件 line 19-368，此处省略展开（纯层0 数据）
table_rows: 20
table_cols: 17
toss_faces: 6  # 骰子 6 面
rules:
  # init 钩子：init_tab + add_action(move/toss/reset/csave/deploy/lose/draw/review)
  - id: chess_init
    event: init
    condition:
      kind: always
    action: register_commands
    commands: [move, toss, reset, csave, deploy, lose, draw, review]
    priority: 0
    # 附带：init_tab() 初始化 table=keys(TABLE)+sort_array
# layer3-escape: init_tab() - table = keys(TABLE) + sort_array(table,1)，
#   排序+keys 操作，简单但属运行时初始化逻辑（可边界归层0，但 sort_array 是计算）。
# layer3-escape: do_move(arg) - 核心走棋逻辑：
#   sscanf 解析 "sCOL sROW to tCOL tROW" + 边界校验（9x9 范围）+ 棋子存在校验 +
#   阵营校验（round 匹配）+ 7 种棋子走法判定（车直线+蹩马腿/马日字+蹩马腿/
#   相田字+塞象眼+不过河/仕九宫斜/帅九宫直/炮直线+翻山吃子/兵直走+过河方可横走）+
#   吃子判定+胜负判定（吃将）+ 王见王死棋检测 + 棋谱记录（平/进/退+chinese_number）+
#   TABLE 状态更新 + round 切换 + c_chess 战绩更新 + pending/draw_chess 清理，
#   大量嵌套 if/for + 棋盘状态机 + 棋谱字符串构建，图灵完备。
# layer3-escape: do_toss() - 投骰子：random(6) + 重复投骰防平 + tossText 渲染 +
#   name1/name2/id1/id2 注册 + first（先行）判定 + num 记录，
#   随机+状态机+多副作用。
# layer3-escape: do_draw() - 和局提议：find_player 对手 + 多分支校验（over/
#   局外人/步数<30/回合判定/在场）+ pending/draw_chess 双方确认状态机 +
#   message_vision + 议和成功则 set over=drawn_game + 战绩更新，
#   多分支+双方确认状态机。
# layer3-escape: do_lose() - 认输：多分支校验（局外人/已结束/无吃子）+
#   find_player 对手 + set over + 战绩更新 + message_vision。
# layer3-escape: do_save() - bb=1 + save() + write，存档状态切换。
# layer3-escape: do_deploy() - bb=1 + 在场校验 + restore() + setup() +
#   delete start_time，残局恢复+状态切换。
# layer3-escape: do_reset() - bb=0 + 在场校验 + new(base_name) 新棋盘 +
#   move + set startroom + destruct(this_object)，对象重建+销毁。
# layer3-escape: do_review() - 时间计算（t=time()-start_time 拆解为月/天/时/分/秒）+
#   chinese_number 拼接 + 棋谱 aaa 输出，时间计算+字符串构建。
# layer3-escape: long() - 棋盘渲染：按 me->name 是否 == first 决定正/反视角 +
#   双重 for 遍历 table 渲染每格（边框 vs 棋子）+ 动态修改 TABLE 边框字符（翻转视角）+
#   楚河汉界状态消息拼接 + 所吃棋子列表拼接，双重循环+视角翻转+动态字符串构建。
# layer3-escape: do_check() - 将军检测：定位当前方帅位置 + 4 方向卒/兵威胁检测 +
#   4 方向车/炮威胁检测（含翻山炮 tem3 计数）+ 8 方向马威胁检测（含蹩马腿），
#   多重 for 循环+8 方向扫描+威胁判定，图灵完备棋局分析。
