# 转译自 /Users/gukt/github/xkx2001-utf8/d/shaolin/shanmen.c
# basename: d_shaolin_shanmen
# LPC 未 replace_program(ROOM)，有自定义 valid_leave 事件钩子。
# 语义单元 11 个：层0 数据 7 个 + 层1 规则 4 个
# 层归属：层0=7  层1=4  层2=0  层3=0
id: d/shaolin/shanmen
short: 少林寺
long: |
  一个巨大的牌坊横架在两片山壁之间，牌坊正上方刻着三个
  斗大的字：『少林寺』。字迹有些剥落，看上去年代久远。两位
  三十来岁的僧人手持戒刀守在山门两侧。左侧立着一块石碑。
exits:
  eastup: d/shaolin/shijie8
  west: d/shaolin/shijie7
outdoors: shaolin
objects:
  kungfu/class/shaolin/xu-tong: 1
  kungfu/class/shaolin/xu-ming: 1
cost: 1

# ===== 层1 事件规则 =====
rules:
  # 规则1：女性 + 方向 eastup + 未通关罗汉阵 + 虚通在场 -> deny
  # 对应 LPC: if (me->query("gender")=="女性" && dir=="eastup" && !me->query("luohan_winner") && present("xu tong",...))
  - id: shaolin_shanmen_block_female_xutong
    event: valid_leave
    dir: eastup
    condition:
      all:
        - kind: attr_eq
          attr: gender
          value: 女性
        - kind: not
          child:
            kind: has_flag
            flag: luohan_winner
        - kind: present_npc
          npc: xu-tong
    action: deny
    priority: 10
    message: >-
      虚通伸手拦住你白眼一翻说道：千年以来，少林向不许女流擅入。
      虚通又道；{respect}请下山去吧，免得自讨没趣。

  # 规则2：女性 + 方向 eastup + 未通关罗汉阵 + 虚明在场（虚通不在场时的 fallback） -> deny
  # 对应 LPC: else if(present("xu ming", environment(me)))
  # 注意：LPC 用 if/else if，虚通优先于虚明。deny-wins + priority 表达此顺序。
  - id: shaolin_shanmen_block_female_xuming
    event: valid_leave
    dir: eastup
    condition:
      all:
        - kind: attr_eq
          attr: gender
          value: 女性
        - kind: not
          child:
            kind: has_flag
            flag: luohan_winner
        - kind: present_npc
          npc: xu-ming
    action: deny
    priority: 9
    message: >-
      虚明迈步挡在你身前，双手合什说道：阿弥陀佛，这位{respect}请留步，恕小寺不接待女客。
      虚明顿了一顿又说：女施主倘若一心向佛，何妨去峨眉山随喜？

  # 规则3：非少林派 + 方向 eastup + 持有武器 + 虚通在场 -> deny
  # 对应 LPC: if ((!myfam || myfam["family_name"]!="少林派") && dir=="eastup") 遍历背包查 weapon_prop + present("xu tong")
  - id: shaolin_shanmen_block_weapon_xutong
    event: valid_leave
    dir: eastup
    condition:
      all:
        - kind: not
          child:
            kind: family_eq
            family: 少林派
        - kind: has_item
          item_category: weapon
        - kind: present_npc
          npc: xu-tong
    action: deny
    priority: 8
    message: >-
      虚通拦住你说道：这位{respect}请放下兵刃。少林千年的规矩，外客
      不得持兵刃上山。

  # 规则4：非少林派 + 方向 eastup + 持有武器 + 虚明在场（虚通不在场 fallback） -> deny
  - id: shaolin_shanmen_block_weapon_xuming
    event: valid_leave
    dir: eastup
    condition:
      all:
        - kind: not
          child:
            kind: family_eq
            family: 少林派
        - kind: has_item
          item_category: weapon
        - kind: present_npc
          npc: xu-ming
    action: deny
    priority: 7
    message: >-
      虚明迈步挡在你身前，双手合什说道：阿弥陀佛，这位{respect}请收起
      兵刃。佛门清静之地，不便随意舞刀弄剑。还请施主鉴谅。

# ===== 层3 逃生舱项 =====
# 无。valid_leave 的所有条件均可用现有谓词集（attr_eq / not / has_flag / present_npc / family_eq / has_item）表达。
# 注意：has_item 当前定义是"持有物品(item_id)"，本文件需要"持有武器类(item_category=weapon)"，属于 has_item 谓词的扩展（按类别查询）。
#       扩展后仍属层1，不需层3。
# 注意：RANK_D->query_respect(me) 是敬称动态文本，用 {respect} 占位符，渲染期由 PronounContext 解析，不影响层归属。
