#   create_inquiry（层2） / create_misc（层0） / homes 表（层0） /
#   init（层3） / do_destory（层3） / accept_fight（层3） / accept_kill（层3） /
#   do_copy（层3） / return_home（层3） / is_unarmed（层3）
# 层归属：层0=6  层1=0  层2=1  层3=7
