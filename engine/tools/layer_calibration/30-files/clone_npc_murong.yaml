inquiry:
  慕容复: 我给我孩儿取名为"复"，就是命他时刻不忘列祖列宗的遗训，须当兴复大燕，夺还江山。
  慕容: 嘿嘿，大燕国当年慕容、慕容恪、慕容 垂、慕容德何等英雄！
  慕容氏: 嘿嘿，大燕国当年慕容、慕容恪、慕容 垂、慕容德何等英雄！
  大燕国: 昔年大燕国威震河朔，打下了锦绣江山，只可惜敌人凶险狠毒，颠覆我邦。
  邪派: 天下邪派有星宿派，白驼山，雪山派和血刀门。
  正派: 天下名门正派有武当派，华山派和峨嵋派。
  名门正派: 天下名门正派有武当派，华山派和峨嵋派。
# layer3-escape: chat_msg = ({ (: random_move :) }) - 函数指针式随机游走，
#   虽以 set 声明但执行体 random_move 是图灵完备移动逻辑（见 return_home），
#   chat_chance 触发概率也需运行时随机。标记为层3 行为。
# layer3-escape: init() - 正邪判定自动攻击：多分支条件
#   (combat_exp<100000 return / family not in 邪派四门 return /
#    interactive && shen>1000 -> 喝道+say+set_leader+do_copy+kill_ob) +
#   spouse 查找分支（find_player / new USER_OB + restore + call_out do_destory）+
#   spouse family 正派校验分支（已注释），多分支状态机+call_out 闭包+
#   find_player/new 动态对象操作，图灵完备。
# layer3-escape: do_destory(ob) - call_out 回调，destruct(ob) 动态对象销毁，
#   闭包回调+对象生命周期操作。
# layer3-escape: accept_fight(ob) - qi*100/max_qi<=80 百分比计算 +
#   command("sneer") + message_vision + do_copy(ob) + kill_ob(ob)，
#   条件计算+多副作用+触发 do_copy 链。
# layer3-escape: accept_kill(ob) - command("haha"/"say") + do_copy(ob)，
#   多副作用+触发 do_copy 链。
# layer3-escape: do_copy(ob) - 核心技能拷贝：3 套 for 循环删除 me 的 skills/
#   maps/prepares + for 循环遍历 ob->query_skills 调用 is_unarmed/
#   SKILL_D->valid_enable 判定后 set_skill 200 + 第二轮 for 重设 map/
#   prepare（含 valid_combine 校验双 prepare 组合） + 兜底默认技能设置 +
#   reset_action，循环+动态派发+条件嵌套。
# layer3-escape: return_home(home) - 随机游走：environment 校验 + living/
#   is_fighting/is_busy 状态守卫 + homes[random] 随机选目标 + move(home)，
#   状态机+随机。
# layer3-escape: is_unarmed(skill) - 辅助判定函数：member_array 查 +
#   for 循环遍历 unarmed_types 调 SKILL_D(skill)->valid_enable 判定，
#   循环+动态派发，被 do_copy 调用。
