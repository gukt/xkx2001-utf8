# 转译自 /Users/gukt/github/xkx2001-utf8/cmds/std/ask.c
# basename: cmds_std_ask
# ask 命令是对话触发命令，属于引擎侧命令管线末端命令对象。
# inquiry 查询本质是对话树入口，但 LPC 实现以函数+查询为主，可部分层2/层1 表达。
# 语义单元 5 个：msg_dunno 常量 / msg_foreign 常量 / main 前置检查 / main 对话分发 / help
# 层归属：层0=3  层1=1  层2=1  层3=2
# 引擎侧/内容侧：引擎侧（msg 常量与 inquiry 分发表是内容侧可扩展的数据，但 ask 命令调度本身是引擎侧）

# ── 层0：纯数据声明 ──
help_text: |
  指令格式: ask <someone> about <something>
  这个指令在解谜时很重要, 通常必须藉由此一指令才能
  获得进一步的资讯。

msg_dunno:
  - "$n摇摇头，说道：没听说过。\n"
  - "$n睁大眼睛望着$N，显然不知道$P在说什么。\n"
  - "$n耸了耸肩，很抱歉地说：无可奉告。\n"
  - "$n说道：嗯....这我可不清楚，你最好问问别人吧。\n"
  - "$n想了一会儿，说道：对不起，你问的事我实在没有印象。\n"

msg_foreign:
  - "$n说道：你在说外国话吧？我不会，你最好带个翻译来。\n"
  - "$n嘻嘻笑道：你说什么鸟语？\n"
  - "$n说道：才阿八热古里古鲁。你看，我也能假装会说外国话。\n"

# ── 层1：事件规则 condition->action（前置检查） ──
rules:
  - id: ask_self
    description: 不可问自己
    when: command == "ask"
    condition: { attr_lt: { target: ob, attr: "id", value: me.id } }
    action: deny
    message: "何必问自己？"

# ── 层2：对话树节点（inquiry 查询） ──
# NPC 的 inquiry/<topic> 是对话树叶子节点：condition(topic 命中) -> action(输出 msg)。
# LPC 实现：ob->query("inquiry/"+topic) 返回 string 时直接输出。
# 这是对话树的最简形式：单 topic -> 单响应。
dialog_tree:
  - id: inquiry_topic
    description: NPC inquiry 映射查询
    condition: { has_inquiry: { target: ob, topic: "{topic}" } }
    response: "{ob.inquiry[topic]}"

  - id: ask_name_by_attitude
    description: 询问名字按 attitude 分支响应
    condition: { any: [{ attr_eq: { target: ob, attr: "name", value: "{topic}" } }, { eq: { value: "{topic}", const: "name" } }] }
    branches:
      aggressive:
        condition: { attr_in: { target: ob, attr: "attitude", values: ["aggressive", "killer"] } }
        response: "$N对$n把眼一瞪：{RANK_D.query_self_rude(ob)}的名字是可以随便提的吗？！我看你这{RANK_D.query_rude(me)}是活腻了！"
      heroism:
        condition: { attr_eq: { target: ob, attr: "attitude", value: "heroism" } }
        response: "$N对$n哈哈一笑：{ob.name}便是{RANK_D.query_self_rude(ob)}！"
      peaceful_friendly:
        condition: { attr_in: { target: ob, attr: "attitude", values: ["peaceful", "friendly"] } }
        response: "$N对$n作了一揖：这位{RANK_D.query_respect(me)}可真会开玩笑，怎么会突然问起{RANK_D.query_self(ob)}的名字？"
        side_effect: { emote: { npc: ob, emote: "sigh" } }
      default:
        response: "$N对$n作了一揖：这位{RANK_D.query_respect(me)}可真会开玩笑，怎么会突然问起{RANK_D.query_self(ob)}的名字？"
        side_effect: { emote: { npc: ob, emote: "sigh" } }

  - id: ask_here
    description: 询问"here"返回当前房间 short
    condition: { eq: { value: "{topic}", const: "here" } }
    response: "$n对$N说道：这里是{env.short}，其它的{RANK_D.query_self(ob)}不便多说。"

  - id: ask_unknown
    description: 未知 topic 返回 dunno 随机消息
    condition: { always: true }
    response: "{random_choice(msg_dunno)}"

# ── 层3：复杂命令处理逻辑 ──
# layer3-escape: main() 对话调度主逻辑：sscanf 解析 "X about Y" 语法、present 查找 NPC、
#   is_character/can_speak 检查、INQUIRY_D->parse_inquiry 委托（job system 等扩展钩子）、
#   userp/living 检查、ob->query("inquiry/"+topic) 查询、topic[0]<128 外国话判定（字节级检查）、
#   attitude switch 分支+RANK_D 称呼+EMOTE_D->do_emote 副作用、
#   "here"/default 分支+random(sizeof(msg_dunno)) 随机选取。
#   sscanf+present+字节检查+switch+random+emote 副作用交织，部分可层2 表达但调度整体属层3。
# layer3-escape: seteuid(getuid()) 在 main 开头调用，是 LPC 命令特权提升，属引擎侧平台代码。
