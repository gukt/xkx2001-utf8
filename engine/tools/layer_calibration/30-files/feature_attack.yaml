# 转译自 /Users/gukt/github/xkx2001-utf8/feature/attack.c
# basename: feature_attack
# 攻击特性：fight_ob/kill_ob/clean_up_enemy/select_opponent/attack/reset_action/init/special_attack
# 引擎侧核心代码，全为层3（平台代码=ECS System）。
# 语义单元 14 个
# 层归属：层0=2  层1=0  层2=0  层3=12
id: feature/attack

# ──────────── 层0：静态声明 ────────────
# MAX_OPPONENT 常量：同时攻击目标上限
MAX_OPPONENT: 4
# S_COMBAT_D 常量：阵法合击 daemon 路径（后置）
S_COMBAT_D: /adm/daemons/s_combatd

# enemy/killer 数组初始值（static，不存档）
enemy_init: []
killer_init: []

# ──────────── 层3：攻击/敌人管理核心逻辑 ────────────
# layer3-escape: query_enemy() / query_killer() 返回 enemy/killer 数组，
#   运行时状态查询接口
# layer3-escape: is_fighting(ob) 判断是否在战斗，
#   varargs + member_array 查找，过程逻辑
# layer3-escape: is_killing(id) 判断是否在追杀，
#   varargs + member_array 查找，过程逻辑
# layer3-escape: fight_ob(ob) 加入敌对列表，
#   ob 有效性检查 + set_heart_beat(1) + member_array 去重 + enemy += ob，
#   多步副作用（启动 tick=1s 心跳是架构不变量）
# layer3-escape: kill_ob(ob) 启动追杀，
#   no_fight 房间守卫 + killer 去重 + tell_object 通知 victim + fight_ob，
#   多步副作用交织
# layer3-escape: clean_up_enemy() 清理无效敌人，
#   遍历 enemy + 三重条件（!objectp/不同房间/!living 且非 killing）+ enemy -= ({0})，
#   过程逻辑；killing 关系敌人即使非 living 也不清除
# layer3-escape: select_opponent() 随机选取攻击目标，
#   random(MAX_OPPONENT) + 边界回退 enemy[0]，
#   combat 范围随机性（需 seeded RNG），过程逻辑
# layer3-escape: remove_enemy(ob) / remove_killer(ob) / remove_all_enemy() / remove_all_killer()
#   四个敌人/杀手关系移除函数，均含 is_killing 守卫 + 数组操作 + 双向解除断言，
#   过程逻辑
# layer3-escape: reset_action() 刷新招式映射，
#   weapon skill_type / prepare / unarmed 三分支确定 type +
#   query_skill_mapped 分支（mapped skill 用 SKILL_D->query_action functionp，
#   否则 weapon->query actions 或 default_actions）+ set("actions",...)，
#   多分支过程逻辑，actions 是 do_attack 步骤 1 的前置
# layer3-escape: special_attack(opponent) 阵法合击入口（后置），
#   stand/anubis temp 检查 + S_COMBAT_D->fight，过程逻辑
# layer3-escape: attack() heart_beat 步骤 5 战斗行动入口，
#   clean_up_enemy + select_opponent + set_temp last_opponent +
#   yield 守卫 + special_attack 检查 + COMBAT_D->fight，
#   多步副作用交织，架构不变量：tick=1s 驱动
# layer3-escape: init() auto_fight 三触发入口（attack.c:229-258），
#   六重前置守卫（is_fighting/!living/!this_player/不同房间/!living(ob)/linkdead）+
#   hatred（is_killing）> vendetta（vendetta_mark 匹配）> aggressive（attitude）三触发优先级 +
#   COMBAT_D->auto_fight 调用，多分支过程逻辑
