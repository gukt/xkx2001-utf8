# basename: clone_misc_jinnang
# 锦囊任务物品，存放玩家信函，具备 read/add/discard 命令 + 动态 long 生成 + 存档。
# 语义单元 9 个：create_name_weight（层0） / create_props（层0） /
#   query_autoload（层0） / query_save_file（层0） / set_owner（层3） /
#   init 动态 long + add_action（层3） / do_read（层3） / do_add（层3） /
#   do_cut（层3） / add_letter/cut_letter 辅助（层3）
# 层归属：层0=4  层1=0  层2=0  层3=6
id: clone/misc/jinnang
name: 锦囊
aliases: ["jin nang", "nang"]
weight: 100
unit: 个
material: silk
no_get: 1
no_drop: 锦囊是随身物品，你不能随便丢下它
no_insert: 1
autoload: true
save_file_template: DATA_DIR + "letter/" + id[0..0] + "/" + id + "_jin"
inherit_item: true
inherit_save: true
# layer3-escape: set_owner(id) - set("owner_id",id) + restore()，
#   按 owner_id 动态构造存档路径并恢复，状态驱动+存档操作。
# layer3-escape: init() - 动态 long 生成：for 循环遍历 letters mapping 数组，
#   拼接 letter_msg（第 N 封/标题/from/time）+ 按 letter_num 分支设 long（有信/无信）+
#   set master_id + set_owner + add_action(read/add/discard)，循环+动态字符串构建+
#   多分支+命令注册。
# layer3-escape: do_read(arg) - sscanf 解析编号 num + 边界校验（letters 存在/
#   num 范围）+ printf 格式化输出信件内容（title/to/text/from/time），多分支+格式化。
# layer3-escape: do_add(arg) - present(arg,this_player()) 查找物品 + 多分支校验
#   （can_add_jinnang/be_read/letters 上限 9）+ query("letter") 取信件 mapping +
#   add_letter + save + init（重新生成 long）+ destruct(ob_letter)，多分支+对象操作+
#   状态变更+存档。
# layer3-escape: do_cut(arg) - sscanf 解析编号 + 边界校验 + cut_letter + save +
#   init（重新生成 long），多分支+状态变更+存档。
# layer3-escape: add_letter(letter)/cut_letter(letter) - letters 数组的增删操作，
#   依赖 pointerp(letters) 判空初始化，数组操作辅助函数，被 do_add/do_cut 调用。
