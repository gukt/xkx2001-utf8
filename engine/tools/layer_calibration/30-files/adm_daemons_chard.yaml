# 转译自 /Users/gukt/github/xkx2001-utf8/adm/daemons/chard.c
# basename: adm_daemons_chard
# chard 是角色初始化 daemon，按 ADR-0014 归属"无状态服务"（12 个之一）。
# 种族 -> race daemon 路径映射是层0 数据，但 setup_char 的属性钳位算法和
# make_corpse/break_relation 的对象操作是层3。
# 语义单元 5 个：race 路径常量 / create / setup_char / make_corpse / break_relation
# 层归属：层0=1  层1=0  层2=0  层3=4
# 引擎侧/内容侧：引擎侧

# ── 层0：纯数据声明 ──
race_daemon_map:
  人类: /adm/daemons/race/human
  妖魔: /adm/daemons/race/monster
  野兽: /adm/daemons/race/beast
  家畜: /adm/daemons/race/stock
  飞禽: /adm/daemons/race/bird
  游鱼: /adm/daemons/race/fish
  蛇类: /adm/daemons/race/snake
  昆虫: /adm/daemons/race/insect

# ── 层3：RestrictedPython 脚本逃生舱（无状态服务，平台代码） ──
# 按 ADR-0014，chard 归属"无状态服务"（进程内模块），但仍属引擎侧平台代码。
# 以下语义单元全部是层3：属性钳位算法 / 对象生命周期操作 / 条件分支对象状态写入。

# layer3-escape: create() seteuid(getuid()) daemon 对象生命周期初始化
# layer3-escape: setup_char(ob) 角色初始化算法：
#   race 默认值填充(未设则"人类") + switch(race) 分派 race daemon setup_* +
#   jing/qi/jingli 未定义时初始化为 max + eff_jing/eff_qi 钳位到 max +
#   jiajin 默认 1 + 玩家内力上限钳位(max_neili<=force*con*2/3) +
#   玩家精力上限钳位(max_jingli<=force*con/2, 下限 100) +
#   NPC 无 force 时自动 set_skill("force", max_neili/6) +
#   shen_type/shen 默认值(玩家 0, NPC shen_type*combat_exp/10) +
#   behavior_exp=shen / quest_exp=age*10 默认 +
#   max_encumbrance=str*5000+(query_str-str)*1000 +
#   reset_action()。
#   多属性钳位公式 + 条件分支 + userp/NPC 分支 + 技能设置，属层3 算法。
#   （详见 layer_h_daemons.py _setup_char 规格，12 个 SideEffect）
# layer3-escape: make_corpse(victim, killer) 尸体生成：
#   is_ghost 分支(物品散落+return 0) + new(CORPSE_OB) 克隆尸体 +
#   set_name/set_long/set_age/set_gender/set_victim_name/set_combat_exp/set_weight/set_max_encumbrance +
#   set my_killer + find_object("/d/taishan/fengchan") mengzhu 查找 + was_userp 标记 +
#   corpse.move(environment) + all_inventory 物品转移(equipped worn 分支 wear())。
#   对象克隆+多属性设置+物品循环转移+条件分支，层3。
# layer3-escape: break_relation(player) 华山派师徒解除：
#   family=="华山派" 条件 + find_object("/d/huashan/xiaofang") 房间查找 +
#   present("feng qingyang") NPC 查找 + player.delete("family") + set("title","普通百姓") +
#   tell_object + 风清扬 NPC delete students/set pending/save。
#   跨对象状态写入+持久化+条件分支，层3。
