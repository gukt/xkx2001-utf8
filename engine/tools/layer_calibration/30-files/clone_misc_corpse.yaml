# 转译自 /Users/gukt/github/xkx2001-utf8/clone/misc/corpse.c
# basename: clone_misc_corpse
# 尸体物品，含 call_out 驱动的 4 阶段腐烂状态机（fresh->rotting->skeleton->ash）。
# 语义单元 6 个：create_name_long（层0） / create_decay_init（层3） /
#   is_corpse/is_character/is_container 谓词（层0） / short 覆写（层0） /
#   decay 状态机（层3） / F_FOOD 继承（层0）
# 层归属：层0=4  层1=0  层2=0  层3=2
id: clone/misc/corpse
name: 无名尸体
aliases: ["corpse"]
long: |
  这是一具无名尸体。
unit: 具
inherit_item: true
inherit_food: true
is_container: true
# is_corpse / is_character 由 decayed 阶段动态决定，见层3
# layer3-escape: create() 的 call_out("decay",1,0) - clonep 时启动腐烂状态机，
#   call_out 闭包触发 phase=0 的 decay，进入状态机循环，需逃生舱。
# layer3-escape: decay(phase) - 4 阶段腐烂状态机：
#   phase 0: 设 food_remaining=4/food_supply=weight/1000/food_race=野兽 + call_out(decay,120,1)
#   phase 1: message_vision 腐烂消息 + delete food_supply + switch(gender) 改名
#     （男尸/女尸/默认，注意 LPC switch 缺 break 的 fallthrough 语义） + 改 long +
#     call_out(decay,60,2)
#   phase 2: message_vision 骸骨消息 + 改名骸骨 + set_weight(weight/5) + 改 long +
#     call_out(decay,60,3)
#   phase 3: message_vision 骨灰吹散消息 + for 循环遍历 all_inventory 将非 no_drop
#     物品 move 到 environment + destruct(this_object)
#   含 call_out 闭包链+switch fallthrough+for 循环+对象销毁+动态改名/改重/改描述，
#   图灵完备状态机，无法用层1 谓词或层2 对话树表达。
# short() 覆写：name + "(" + capitalize(query("id")) + ")" - 层0 纯字符串拼接，
#   但依赖运行时 name()/query("id")，属数据声明范畴（公式化 short）。
