# v1 专家修订（2026-07-10）：基于 d/zhongnan/gate.c valid_leave
# S4 ADR-0005：方向绑定 + 组合谓词 + family_eq/has_item，完整表达 LPC 逻辑：
#   dir==north + NOT(全真教 OR 持香) -> deny
# 对照 d/zhongnan/gate.c::valid_leave(me, dir) 的 if (dir=="north") 分支。
# 门状态机（do_knock / call_out close_door / 跨房间 exits 同步）仍缺口（S4+，见 ADR-0004）。
- id: zhongnan_gate_guard
  event: valid_leave
  dir: north
  condition:
    not:
      any:
        - kind: family_eq
          family: 全真教
        - kind: has_item
          item_id: incense
  action: deny
  priority: 0
  message: 中年道士说道：如果不是进香，请回吧。
