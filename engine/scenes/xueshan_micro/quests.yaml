# S4 ADR-0007：xueshan 供奉任务
# 对照 d/xueshan/npc/gelun1.c ask 还愿 + accept_object 酥油罐 + set marks/酥
- id: xueshan/tribute
  name: 供奉佛爷
  giver: xueshan/npc/gelun1
  trigger: 还愿
  description: 给葛伦布一罐酥油，供奉大轮寺佛爷。
  objective:
    kind: give_item
    npc_id: xueshan/npc/gelun1
    item_id: suyou_guan
  reward:
    exp: 100
    flag: 酥
    message: 葛伦布双手合什：佛爷会保佑施主的。

# M3-1 ADR-0032 决策 3：多步 chain 任务（reach_room + give_item）
# 对照 LPC 多步任务模式（fsgelun kill->give corpse 多步）。此处用 reach_room 替代
# 战斗步骤，避免 xueshan_micro 强 NPC gelun1 不可击杀；真实雪山派多步任务（含
# kill_npc/fight_win）后置子任务 4 独立 LLM 内容生产。
- id: xueshan/pilgrimage
  name: 朝山跑腿
  giver: xueshan/npc/gelun1
  trigger: 跑腿
  description: 先去山路看看，再回来供奉酥油。
  objectives:
    - kind: reach_room
      room_id: xueshan/dshanlu
    - kind: give_item
      npc_id: xueshan/npc/gelun1
      item_id: suyou_guan
  reward:
    exp: 150
    flag: 跑腿
    message: 葛伦布点头：施主诚心可嘉。

# M3-1 ADR-0032 决策 3 + ADR-0036：darba fight_win 任务（独立 LLM 内容生产子集）
# 对照 LPC kungfu/class/xueshan/darba.c accept_fight + chat，LLM v0 + 人工 v1 修订。
# darba 是 jinlun 拜师门槛：ask 引见 -> fight 切磋 -> 玩家赢设 flag jlfw -> 解锁 jinlun 拜师。
- id: xueshan/quest/darba
  name: 引见金轮法王
  giver: xueshan/npc/darba
  trigger: 引见
  description: 达尔巴看了你一眼不屑地说：想找我师父，得先过我这一关，这位大侠是不是先和我切搓一下？
  objectives:
  - kind: fight_win
    npc_id: xueshan/npc/darba
  reward:
    flag: jlfw
    message: 达尔巴说：阁下武功确是不一般，在下十分佩服。我师父金轮法王在草原上授猎，你去寻他吧。
    time_gate: 0
  # GAP: LPC darba 另设 marks/引（引见标记）。jlfw 是 jinlun 拜师解锁标记（reward.flag）。
