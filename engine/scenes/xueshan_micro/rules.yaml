# v1 专家修订（2026-07-10）：基于 d/xueshan/shanmen.c valid_leave + d/xueshan/npc/gelun1.c accept_object
# S4 ADR-0005：方向绑定 + 组合谓词 + family_eq/has_item，完整表达 LPC valid_leave 逻辑：
#   dir==north + 葛伦布在场 + NOT(雪山派 OR 血刀门 OR 持酥油 OR 有"酥"标记) -> deny
# 对照 d/xueshan/shanmen.c::valid_leave(me, dir) 的 if (dir=="north") 分支。
# S4 ADR-0006：accept_object 事件（gelun1 接受酥油罐 -> set marks/酥 + 消息），
#   对照 d/xueshan/npc/gelun1.c::accept_object(who, ob)。
- id: xueshan_shanmen_guard
  event: valid_leave
  dir: north
  condition:
    all:
      - kind: present_npc
        npc_id: xueshan/npc/gelun1
      - not:
          any:
            - kind: family_eq
              family: 雪山派
            - kind: family_eq
              family: 血刀门
            - kind: has_item
              item_id: suyou_guan
            - kind: has_flag
              flag: 酥
  action: deny
  priority: 0
  message: 葛伦布挡住你说：你准备用什麽供奉我们佛爷呀？
- id: xueshan_gelun1_accept_suyou
  event: accept_object
  npc_id: xueshan/npc/gelun1
  item_id: suyou_guan
  condition:
    kind: always
  action: set_flag
  flag: 酥
  message: 葛伦布一哈腰：佛爷保佑施主，里边请。
