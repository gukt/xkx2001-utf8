# v1 专家修订（2026-07-10）：基于 d/xueshan/shanmen.c valid_leave + d/xueshan/npc/gelun1.c accept_object
# S4 ADR-0005：方向绑定 + 组合谓词 + family_eq/has_item，完整表达 LPC valid_leave 逻辑：
#   dir==north + 葛伦布在场 + NOT(雪山派 OR 血刀门 OR 持酥油 OR 有"酥"标记) -> deny
# 对照 d/xueshan/shanmen.c::valid_leave(me, dir) 的 if (dir=="north") 分支。
# S4 ADR-0006：accept_object 事件（gelun1 接受酥油罐 -> set marks/酥 + 消息），
#   对照 d/xueshan/npc/gelun1.c::accept_object(who, ob)。
- id: xueshan_shanmen_guard
  event: valid_leave
  dir: north
  condition:
    all:
      - kind: present_npc
        npc_id: xueshan/npc/gelun1
      - not:
          any:
            - kind: family_eq
              family: 雪山派
            - kind: family_eq
              family: 血刀门
            - kind: has_item
              item_id: suyou_guan
            - kind: has_flag
              flag: 酥
  action: deny
  priority: 0
  message: 葛伦布挡住你说：你准备用什麽供奉我们佛爷呀？
- id: xueshan_gelun1_accept_suyou
  event: accept_object
  npc_id: xueshan/npc/gelun1
  item_id: suyou_guan
  condition:
    kind: always
  action: set_flag
  flag: 酥
  message: 葛伦布一哈腰：佛爷保佑施主，里边请。
# C4 ADR-0040：xlama2 交互闭环（对照 d/xueshan/npc/xlama2.c ask_tea + accept_object）
#   ask 酥油茶 -> set marks/茶（ask_tea set_temp("marks/茶",1)）
#   give 酥油 -> clear marks/茶 + 生成 buttertea 到厨房（accept_object delete_temp + new(buttertea)->move）
- id: xueshan_xlama2_ask_tea
  event: ask
  npc_id: xueshan/npc/xlama2
  topic: 酥油茶
  condition:
    kind: always
  action: set_flag
  flag: 茶
  # message 留空：消息走 inquiry 字典（小喇嘛一脸不耐烦...）
- id: xueshan_xlama2_accept_suyou
  event: accept_object
  npc_id: xueshan/npc/xlama2
  item_id: suyou
  condition:
    kind: always
  action: clear_flag
  flag: 茶
  spawn_items:
    - item_id: buttertea
      room_id: xueshan/chufang
      count: 3
  message: 小喇嘛：佛主保佑...请用茶。
# C4 ADR-0043：厨房持茶挡路（对照 d/xueshan/chufang.c valid_leave west + present("tea",me)）
#   持酥油茶朝 west 走被挡，要求先喝完（drink 闭环）。layer1 has_item 谓词，零代码。
- id: xueshan_chufang_tea_block
  event: valid_leave
  dir: west
  condition:
    kind: has_item
    item_id: buttertea
  action: deny
  priority: 0
  message: 别着急，喝完茶再走！
