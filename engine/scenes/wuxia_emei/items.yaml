# 不含：wield_msg/unwield_msg（决策3 留 wield 命令批）/ hit_ob 特效（留 M3 招式表）
# / do_cut/do_lian 命令（留命令批）/ COMBINED_ITEM 堆叠（留方案 A M3）。
# 混合型武器条目前有 # 后置缺口 注释（ADR-0060 决策 4，标注不完整定义）。
