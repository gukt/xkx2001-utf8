constraints:
  - 所有房间 id 必须以 xueshan/ 开头（如 xueshan/dshanlu）。
  - 所有 NPC id 必须以 xueshan/npc/ 开头（如 xueshan/npc/gongcang）。
  - exits 和 objects 只能引用上方 known_*_ids 列表中的 id。
  - 文本字段单行，不使用 YAML 多行（| />）。
  - 武器类别用 staff/blade/sword 等，attack_skill 从 map_skill 推断。

examples:
  - "xueshan/dshanlu exits westup: xueshan/shanmen"
  - "xueshan/npc/gongcang attack_skill: jingang-chu"
