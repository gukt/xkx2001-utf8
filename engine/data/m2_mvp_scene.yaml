      第一回·初入江湖

      天下风云出我辈，一入江湖岁月催。
      华山村口石板路，通往扬州与少林。
      新人当先识方位，再谈刀枪与拳脚。
    - |
      第二回·扬州见闻

      扬州城中四街通衢，武庙侧有藏书阁。
      阁中书卷可按章付银阅读，切记此处只宜读书，不宜练功。
