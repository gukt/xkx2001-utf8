rooms:
  huashan_birth:
    name: 华山村口
    long: 华山脚下一座宁静的小村落，石板路通向村中。这里是江湖新人落脚的地方， 不强制归属任何门派。北面是村中小径，可找向导讨教；南面官道通往扬州。
    outdoors: true
    exits:
      north:
        to: huashan_guide
        aliases:
        - 北
        - 村里
      south:
        to: road_huashan_yz
        aliases:
        - 南
        - 官道
        - 扬州
  huashan_guide:
    name: 华山村广场
    long: 村中央一块空地，老槐树下立着一块指路木牌。向导常在此歇脚， 乐意给初入江湖的人讲解基础门道。东边有一块练武空地。
    outdoors: true
    exits:
      south:
        to: huashan_birth
        aliases:
        - 南
        - 村口
      east:
        to: huashan_training
        aliases:
        - 东
        - 练武场
    objects:
      huashan_guide_npc: 1
  huashan_training:
    name: 华山村练武场
    long: 一块踩得坚实的泥地，立着几个稻草人木桩。这里是切磋安全区—— 即便力竭也不会真正丢了性命，适合初学搏击。
    outdoors: true
    no_death: true
    exits:
      west:
        to: huashan_guide
        aliases:
        - 西
        - 广场
    objects:
      training_pebble: 1
      training_dummy: 1
  yangzhou_guangchang:
    name: 中央广场
    long: 扬州城心的中央广场，石狮守着旗杆，往来车马络绎不绝。 四条大街由此散开，是城中枢纽，也是传闻中动态事件的落脚处。 东北角可见武庙飞檐。
    outdoors: true
    details:
      石狮: 一对石狮蹲在旗杆两侧，爪下各按着一只小石球，神态威严。
      旗杆: 广场中央矗立着旗杆，<c:yellow>旗角</c>猎猎作响。
    exits:
      north:
        to: yangzhou_beidajie
        aliases:
        - 北
      south:
        to: yangzhou_nandajie
        aliases:
        - 南
      east:
        to: yangzhou_dongdajie
        aliases:
        - 东
      west:
        to: yangzhou_xidajie
        aliases:
        - 西
      northeast:
        to: yangzhou_wumiao
        aliases:
        - 东北
        - 武庙
  yangzhou_beidajie:
    name: 北大街
    long: 北大街青石铺就，酒幌与布招随风轻晃，行人多往北门方向去。 东侧是热闹客栈。
    outdoors: true
    exits:
      south:
        to: yangzhou_guangchang
        aliases:
        - 南
        - 广场
      north:
        to: yangzhou_beimen
        aliases:
        - 北
        - 北门
      east:
        to: yangzhou_kedian
        aliases:
        - 东
        - 客栈
  yangzhou_nandajie:
    name: 南大街
    long: 南大街较北街略窄，茶香与脚力车的铃声混在一处，尽头是南门。 西侧镖局匾额赫然。
    outdoors: true
    exits:
      north:
        to: yangzhou_guangchang
        aliases:
        - 北
        - 广场
      south:
        to: yangzhou_nanmen
        aliases:
        - 南
        - 南门
      west:
        to: yangzhou_biaoju
        aliases:
        - 西
        - 镖局
  yangzhou_dongdajie:
    name: 东大街
    long: 东大街通向东门，再往东便是出城官道。街边多钱庄商号，南侧有茶馆。
    outdoors: true
    exits:
      west:
        to: yangzhou_guangchang
        aliases:
        - 西
        - 广场
      east:
        to: yangzhou_dongmen
        aliases:
        - 东
        - 东门
      north:
        to: yangzhou_qianzhuang
        aliases:
        - 北
        - 钱庄
      south:
        to: yangzhou_chaguan
        aliases:
        - 南
        - 茶馆
      northeast:
        to: yangzhou_hanlin
        aliases:
        - 东北
        - 翰林院
  yangzhou_hanlin:
    name: 翰林府前院
    long: 翰林府前院清幽，东侧闺房门紧闭。凌翰林立于西廊，似在守着通往小园的路。
    exits:
      southwest:
        to: yangzhou_dongdajie
        aliases:
        - 西南
        - 东大街
      west:
        to: yangzhou_hanlin_garden
        aliases:
        - 西
        - 小园
      east:
        to: yangzhou_hanlin_neiyuan
        door: locked
        key: hanlin_key
        consume_key: true
        hidden_until_unlocked: true
        aliases:
        - 东
        - 闺房
    block_exits:
      west:
        npc: ling_hanlin
    objects:
      hanlin_key: 1
      ling_hanlin: 1
  yangzhou_hanlin_garden:
    name: 翰林小园
    long: 小园里几丛修竹，石凳上落着薄尘。
    exits:
      east:
        to: yangzhou_hanlin
        aliases:
        - 东
        - 前院
  yangzhou_hanlin_neiyuan:
    name: 翰林闺房
    long: 闺房窗棂透进一缕光，案上摊着未写完的诗稿。
    exits:
      west:
        to: yangzhou_hanlin
        aliases:
        - 西
        - 前院
  yangzhou_xidajie:
    name: 西大街
    long: 西大街连通西门，铁匠铺的锤声隐约可闻，南侧有马厩，马蹄印留在土路上。
    outdoors: true
    exits:
      east:
        to: yangzhou_guangchang
        aliases:
        - 东
        - 广场
      west:
        to: yangzhou_ximen
        aliases:
        - 西
        - 西门
      north:
        to: yangzhou_datiepu
        aliases:
        - 北
        - 打铁铺
      south:
        to: yangzhou_stable
        aliases:
        - 南
        - 马厩
  yangzhou_beimen:
    name: 北门
    long: 扬州北门城楼高耸，门洞可通马车。城外是北郊田野。
    outdoors: true
    exits:
      south:
        to: yangzhou_beidajie
        aliases:
        - 南
        - 北大街
  yangzhou_nanmen:
    name: 南门
    long: 南门相对冷清，守军换岗的脚步声在砖石间回响。南面官道通往华山方向。
    outdoors: true
    exits:
      north:
        to: yangzhou_nandajie
        aliases:
        - 北
        - 南大街
      south:
        to: road_huashan_yz
        aliases:
        - 南
        - 官道
        - 华山
  yangzhou_dongmen:
    name: 东门
    long: 东门是出城官道的起点，车马与客商多从此门进出。城门外官道向东延伸。
    outdoors: true
    exits:
      west:
        to: yangzhou_dongdajie
        aliases:
        - 西
        - 东大街
      east:
        to: road_yz_east
        aliases:
        - 东
        - 官道
  yangzhou_ximen:
    name: 西门
    long: 西门城垛上旗帜猎猎。两名同名官兵并肩站岗，盘查过往行人。
    outdoors: true
    exits:
      east:
        to: yangzhou_xidajie
        aliases:
        - 东
        - 西大街
    objects:
      yangzhou_ximen_guard: 2
  road_huashan_yz:
    name: 华山至扬州官道
    long: 连接华山村与扬州南门的官道路段。北端通向华山村口，南端可见扬州城墙。 路面平坦，适合步行或骑乘。
    outdoors: true
    exits:
      north:
        to: huashan_birth
        aliases:
        - 北
        - 华山
        - 村口
      south:
        to: yangzhou_nanmen
        aliases:
        - 南
        - 扬州
        - 南门
  road_yz_east:
    name: 扬州东门外官道
    long: 出东门后的官道路段，黄土飞扬。东面地势渐险，通往扬州郊外林野。 路边拴着一匹矮种马，耐力一般，难走陡坡。
    outdoors: true
    exits:
      west:
        to: yangzhou_dongmen
        aliases:
        - 西
        - 东门
      east:
        to: wild_edge
        aliases:
        - 东
        - 郊外
    objects:
      road_pony: 1
  wild_edge:
    name: 扬州郊外陡坡
    long: 官道在此折入陡坡，乱石嶙峋。坐骑能力不足者只能下马步行。 再往东便是密林遭遇区。
    outdoors: true
    cost: 8
    exits:
      west:
        to: road_yz_east
        aliases:
        - 西
        - 官道
      east:
        to: wild_forest
        aliases:
        - 东
        - 密林
  wild_forest:
    name: 扬州郊外密林
    long: 林深叶密，鸟雀惊飞。偶有山贼出没，会主动袭击过路人。
    outdoors: true
    exits:
      west:
        to: wild_edge
        aliases:
        - 西
        - 陡坡
      east:
        to: wild_thicket
        aliases:
        - 东
        - 林深处
    objects:
      bandit_purse: 1
      wild_bandit: 1
  wild_thicket:
    name: 郊外林深处
    long: 灌木丛生，小径蜿蜒。东面隐约传来水声，是官道渡口。
    outdoors: true
    exits:
      west:
        to: wild_forest
        aliases:
        - 西
        - 密林
      east:
        to: ferry_west
        aliases:
        - 东
        - 渡口
  ferry_west:
    name: 官道西岸渡口
    long: 河面不宽，渡船按钟点往返两岸。东岸通向少林方向官道。
    outdoors: true
    ferry:
      far_bank: ferry_east
      cross_interval: 3
      direction: across
    exits:
      west:
        to: wild_thicket
        aliases:
        - 西
        - 林深处
  ferry_east:
    name: 官道东岸渡口
    long: 东岸渡口石阶湿滑，渡船靠岸时可过河。再往东是少林山门前官道。
    outdoors: true
    ferry:
      far_bank: ferry_west
      cross_interval: 3
      direction: across
    exits:
      east:
        to: road_shaolin
        aliases:
        - 东
        - 官道
  road_shaolin:
    name: 少林山门外官道
    long: 官道尽头可见少林山门匾额。西面是渡口，东面即山门。
    outdoors: true
    exits:
      west:
        to: ferry_east
        aliases:
        - 西
        - 渡口
      east:
        to: shaolin_shanmen
        aliases:
        - 东
        - 山门
  yangzhou_kedian:
    name: 悦来客栈
    long: 客栈大堂灯火通明，账房算盘噼啪作响。店小二穿梭于桌椅之间招呼客官。
    exits:
      west:
        to: yangzhou_beidajie
        aliases:
        - 西
        - 北大街
    objects:
      kedian_waiter: 1
  yangzhou_qianzhuang:
    name: 金生钱庄
    long: 钱庄柜台后堆着账册与银箱。伙计笑脸相迎，专营银票兑换与钱财往来。
    exits:
      south:
        to: yangzhou_dongdajie
        aliases:
        - 南
        - 东大街
    objects:
      bank_note: 1
      bank_clerk: 1
  yangzhou_datiepu:
    name: 打铁铺
    long: 炉火正旺，铁砧上火星四溅。墙上挂着新打的刀剑与农具。
    day_shop: true
    exits:
      south:
        to: yangzhou_xidajie
        aliases:
        - 南
        - 西大街
    objects:
      steel_blade: 1
      blacksmith: 1
  yangzhou_biaoju:
    name: 龙门镖局
    long: 镖局门楣高悬「龙门」二字，镖头在厅中擦拭兵器，墙上挂满镖旗。
    exits:
      east:
        to: yangzhou_nandajie
        aliases:
        - 东
        - 南大街
    objects:
      escort_chief: 1
      escort_cargo: 1
  yangzhou_wumiao:
    name: 武庙
    long: 武庙香火未绝，关公塑像威严。庙祝低声诵念，供桌上陈列兵器模型。
    exits:
      southwest:
        to: yangzhou_guangchang
        aliases:
        - 西南
        - 广场
      north:
        to: yangzhou_cangshuge
        aliases:
        - 北
        - 藏书阁
    objects:
      temple_keeper: 1
  yangzhou_cangshuge:
    name: 藏书阁
    long: 扬州藏书阁内书架林立，纸墨清香。墙上有告示：此处只供读书，不许练功比武。
    no_fight: true
    no_steal: true
    no_sleep_room: true
    library:
      shelf: 书架
      books:
      - xkx_intro
      - yangzhou_notes
    details:
      告示: 告示写着：藏书阁内禁止练功比武；读书须按章付银。
    exits:
      south:
        to: yangzhou_wumiao
        aliases:
        - 南
        - 武庙
  yangzhou_chaguan:
    name: 富春茶馆
    long: 茶馆里氤氲着龙井香气，茶博士提着铜壶穿梭，说书人的惊堂木偶一响。
    exits:
      north:
        to: yangzhou_dongdajie
        aliases:
        - 北
        - 东大街
    objects:
      tea_master: 1
  yangzhou_stable:
    name: 马厩
    long: 马厩干草铺地，几匹牲口甩着尾巴。马夫招呼客人选购坐骑，出城官道骑乘更方便。
    outdoors: true
    exits:
      north:
        to: yangzhou_xidajie
        aliases:
        - 北
        - 西大街
    objects:
      yangzhou_horse: 1
      stable_groom: 1
  shaolin_shanmen:
    name: 少林山门
    long: 少林山门气势威严，门楣「少林寺」三字浑厚。知客僧在侧稽首，盘查来客身份。
    outdoors: true
    entry_guard:
      condition:
        and:
        - field: gender
          value: male
        - or:
          - field: has_faction
            value: false
          - field: faction_id
            value: shaolin
      deny_message: 少林山门：须为男子、未属他派。
    exits:
      west:
        to: road_shaolin
        aliases:
        - 西
        - 官道
      north:
        to: shaolin_guangchang
        aliases:
        - 北
        - 广场
    objects:
      shaolin_receptionist: 1
  shaolin_guangchang:
    name: 少林广场
    long: 寺内广场青石平整，香客与僧众往来。东侧武场传出喝声，西侧达摩院静穆。
    outdoors: true
    exits:
      south:
        to: shaolin_shanmen
        aliases:
        - 南
        - 山门
      west:
        to: shaolin_damoyuan
        aliases:
        - 西
        - 达摩院
      east:
        to: shaolin_wuchang
        aliases:
        - 东
        - 武场
      north:
        to: shaolin_cangjingge
        aliases:
        - 北
        - 藏经阁
  shaolin_damoyuan:
    name: 达摩院
    long: 达摩院内烛光摇曳，壁上绘着达摩面壁图。院僧沉默拂尘，不主动搭话。
    exits:
      east:
        to: shaolin_guangchang
        aliases:
        - 东
        - 广场
    objects:
      damoyuan_monk: 1
  shaolin_cangjingge:
    name: 藏经阁
    long: 藏经阁木梯蜿蜒，经卷陈列整齐。阁僧轻声提醒：勿高声喧哗。
    exits:
      south:
        to: shaolin_guangchang
        aliases:
        - 南
        - 广场
    objects:
      library_monk: 1
  shaolin_wuchang:
    name: 少林武场
    long: 武场沙地开阔，木人桩林立。武僧在此指点入门弟子演练拳脚。
    outdoors: true
    exits:
      west:
        to: shaolin_guangchang
        aliases:
        - 西
        - 广场
    objects:
      shaolin_monk_trainer: 1
items:
  training_pebble:
    name: 小石子
    aliases:
    - 石子
    short: 一枚小石子
    long: 练武场边随手可捡的小石子，可用来练习拾取。
  bank_note:
    name: 银票
    aliases:
    - 票
    short: 一张银票
    long: 金生钱庄签发的银票，可流通可兑付。
    valuable: 30
  steel_blade:
    name: 钢刀
    aliases:
    - 刀
    short: 一把钢刀
    long: 打铁铺新淬火的钢刀，刃口锋利。
    valuable: 80
    tags:
    - weapon
    - edged
  hanlin_key:
    name: 闺房钥匙
    aliases:
    - 钥匙
    short: 一把闺房钥匙
    long: 翰林府闺房的钥匙，铜锈斑驳，似是一次性机关钥。
  bandit_purse:
    name: 赃银袋
    aliases:
    - 银袋
    short: 一只赃银袋
    long: 山贼身上搜出的小银袋。
    valuable: 5
  escort_cargo:
    name: 镖货
    aliases:
    - 镖箱
    - 货箱
    short: 一箱镖货
    long: 龙门镖局封好的货箱，须妥送至华山村向导处。
npcs:
  ling_hanlin:
    name: 凌翰林
    aliases:
    - 翰林
    short: 凌翰林
    long: 凌翰林衣冠整肃，立于廊下，目光炯炯，不让人轻易往西去。
  huashan_guide_npc:
    name: 向导
    aliases:
    - 教程向导
    - 老人
    short: 一位和气的向导
    long: 一位鬓发花白的老人，笑眯眯地看着过往行人，随时准备解答基础疑问。
    inquiry:
      移动: 想去别处，用 go <方向>。例如 go north，或看 look 里的出口提示。
      查看: 用 look 环顾四周，可看房间、人物与地上物品。
      拾取: 地上有东西时用 get <物品> 拾起，drop 可放下。
      战斗: 对可交战目标用 attack <名字>，交战后每回合会播报命中与气血。练武场的稻草人不会反击。
      去哪: 练熟基础后，出村口往南走官道可到扬州城闯荡，也可再往东经野外渡口投奔少林等门派。
      default: 你可以问我：移动、查看、拾取、战斗，或「去哪」。
  training_dummy:
    name: 稻草人
    aliases:
    - 木桩
    - 教学木桩
    short: 一个稻草人木桩
    long: 扎得结实的稻草人，专供新人练习招式，不会还手。
    vitals:
      qi_current: 80
      qi_max: 80
      neili_current: 0
      neili_max: 0
      jingli_current: 20
      jingli_max: 20
    attributes:
      str: 5
      con: 10
