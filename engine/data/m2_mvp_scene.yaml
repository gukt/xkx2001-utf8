# M2 MVP 武侠题材包场景（Wave 4 起累加；单文件，见 .scratch/m2-mvp-scene-playable/room-keys.md）
#
# 分区前缀：huashan_* / yangzhou_* / shaolin_* / wild_* / road_* / ferry_*
# 已落地：华山村（21）、扬州枢纽+城门（22）；商业/少林/野外后续票追加。

# ── 房间：华山村（21）+ 扬州枢纽（22）+ 官道桩（22 预留，25 扩展）──
rooms:
  huashan_birth:
    name: 华山村口
    long: >-
      华山脚下一座宁静的小村落，石板路通向村中。这里是江湖新人落脚的地方，
      不强制归属任何门派。北面是村中小径，可找向导讨教。
    outdoors: true
    exits:
      north: { to: huashan_guide, aliases: [北, 村里] }

  huashan_guide:
    name: 华山村广场
    long: >-
      村中央一块空地，老槐树下立着一块指路木牌。向导常在此歇脚，
      乐意给初入江湖的人讲解基础门道。东边有一块练武空地。
    outdoors: true
    exits:
      south: { to: huashan_birth, aliases: [南, 村口] }
      east: { to: huashan_training, aliases: [东, 练武场] }

  huashan_training:
    name: 华山村练武场
    long: >-
      一块踩得坚实的泥地，立着几个稻草人木桩。这里是切磋安全区——
      即便力竭也不会真正丢了性命，适合初学搏击。
    outdoors: true
    no_death: true
    exits:
      west: { to: huashan_guide, aliases: [西, 广场] }

  # ── 扬州枢纽 + 四街四门（22）────────────────────────
  yangzhou_guangchang:
    name: 中央广场
    long: >-
      扬州城心的中央广场，石狮守着旗杆，往来车马络绎不绝。
      四条大街由此散开，是城中枢纽，也是传闻中动态事件的落脚处。
    outdoors: true
    exits:
      north: { to: yangzhou_beidajie, aliases: [北] }
      south: { to: yangzhou_nandajie, aliases: [南] }
      east: { to: yangzhou_dongdajie, aliases: [东] }
      west: { to: yangzhou_xidajie, aliases: [西] }

  yangzhou_beidajie:
    name: 北大街
    long: >-
      北大街青石铺就，酒幌与布招随风轻晃，行人多往北门方向去。
    outdoors: true
    exits:
      south: { to: yangzhou_guangchang, aliases: [南, 广场] }
      north: { to: yangzhou_beimen, aliases: [北, 北门] }

  yangzhou_nandajie:
    name: 南大街
    long: >-
      南大街较北街略窄，茶香与脚力车的铃声混在一处，尽头是南门。
    outdoors: true
    exits:
      north: { to: yangzhou_guangchang, aliases: [北, 广场] }
      south: { to: yangzhou_nanmen, aliases: [南, 南门] }

  yangzhou_dongdajie:
    name: 东大街
    long: >-
      东大街通向东门，再往东便是出城官道。街边多钱庄商号。
    outdoors: true
    exits:
      west: { to: yangzhou_guangchang, aliases: [西, 广场] }
      east: { to: yangzhou_dongmen, aliases: [东, 东门] }

  yangzhou_xidajie:
    name: 西大街
    long: >-
      西大街连通西门，铁匠铺的锤声隐约可闻，马蹄印留在土路上。
    outdoors: true
    exits:
      east: { to: yangzhou_guangchang, aliases: [东, 广场] }
      west: { to: yangzhou_ximen, aliases: [西, 西门] }

  yangzhou_beimen:
    name: 北门
    long: >-
      扬州北门城楼高耸，门洞可通马车。城外是北郊田野。
    outdoors: true
    exits:
      south: { to: yangzhou_beidajie, aliases: [南, 北大街] }

  yangzhou_nanmen:
    name: 南门
    long: >-
      南门相对冷清，守军换岗的脚步声在砖石间回响。
    outdoors: true
    exits:
      north: { to: yangzhou_nandajie, aliases: [北, 南大街] }

  yangzhou_dongmen:
    name: 东门
    long: >-
      东门是出城官道的起点，车马与客商多从此门进出。城门外官道向东延伸。
    outdoors: true
    exits:
      west: { to: yangzhou_dongdajie, aliases: [西, 东大街] }
      east: { to: road_yz_east, aliases: [东, 官道] }

  yangzhou_ximen:
    name: 西门
    long: >-
      西门城垛上旗帜猎猎。两名同名官兵并肩站岗，盘查过往行人。
    outdoors: true
    exits:
      east: { to: yangzhou_xidajie, aliases: [东, 西大街] }

  # 22 预留、25 扩展的官道桩（保证东门 east 出口可加载）
  road_yz_east:
    name: 扬州东门外官道
    long: >-
      出东门后的官道路段，黄土飞扬。再往东是郊外与通往少林的官道（后续扩展）。
    outdoors: true
    exits:
      west: { to: yangzhou_dongmen, aliases: [西, 东门] }

# ── 物品 ──────────────────────────────────────────────
items:
  training_pebble:
    name: 小石子
    aliases: [石子]
    short: 一枚小石子
    long: 练武场边随手可捡的小石子，可用来练习拾取。
    placed_in: huashan_training

# ── NPC ───────────────────────────────────────────────
npcs:
  huashan_guide_npc:
    name: 向导
    aliases: [教程向导, 老人]
    short: 一位和气的向导
    long: 一位鬓发花白的老人，笑眯眯地看着过往行人，随时准备解答基础疑问。
    in_room: huashan_guide
    inquiry:
      移动: 想去别处，用 go <方向>。例如 go north，或看 look 里的出口提示。
      查看: 用 look 环顾四周，可看房间、人物与地上物品。
      拾取: 地上有东西时用 get <物品> 拾起，drop 可放下。
      战斗: 对可交战目标用 attack <名字>，交战后每回合会播报命中与气血。练武场的稻草人不会反击。
      去哪: 练熟基础后，可东出扬州城闯荡，或北上投奔少林等门派——先学会走路与搏击再走不迟。
      default: 你可以问我：移动、查看、拾取、战斗，或「去哪」。

  training_dummy:
    name: 稻草人
    aliases: [木桩, 教学木桩]
    short: 一个稻草人木桩
    long: 扎得结实的稻草人，专供新人练习招式，不会还手。
    in_room: huashan_training
    vitals:
      qi_current: 80
      qi_max: 80
      neili_current: 0
      neili_max: 0
      jingli_current: 20
      jingli_max: 20
    attributes:
      str: 5
      con: 10
      dex: 0
      int: 1

  yangzhou_ximen_guard:
    name: 官兵
    aliases: [守卫, 门卫]
    short: 一名官兵
    long: 身穿号衣的官兵，眼神锐利，与同伴一同把守西门。
    in_room: yangzhou_ximen
    count: 2
    inquiry:
      城防: 西门城防由我等官兵轮值，闲人莫近城垛。
      default: 闲人免进，有事说事。

# ── 玩家 ──────────────────────────────────────────────
player:
  name: 你
  start_room: huashan_birth
  currency: 20
  gender: male
  vitals:
    qi: 100
    qi_max: 100
    neili: 50
    neili_max: 50
    jingli: 50
    jingli_max: 50
  attributes:
    str: 15
