  name: 你
  start_room: huashan_birth
  currency: 200
  gender: male
  vitals:
    qi: 100
    qi_max: 100
    neili: 50
    neili_max: 50
    jingli: 50
    jingli_max: 50
  attributes:
    str: 15
    con: 12
    dex: 10
    int: 10
