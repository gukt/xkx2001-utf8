# Pre-M4 官方机制切片：星宿同构机关验收（非整区移植；官方单文件轨道，无 manifest）。
# 本文件由票 02 创建；后续机关票逐票追加房间。
# 地名 / 绰号写在目标房 aliases；仅 to 的出口用简写（dir: room_key）。
rooms:
  dig_base:
    name: 白玉峰脚
    aliases:
    - 峰脚
    long: 峰脚乱石滩，北面是可试着挖洞的坡壁。东面有一条岔路，西面通向玉石甬道，南面是沙漠，东北可登峭壁。另有荒僻小径与日月洞口。
    outdoors: true
    exits:
      north: dig_peak
      east: fork_hub
      west: jade_gate
      south: desert_maze
      northeast: cliff_edge
      southeast: cliff_base
      northwest: sunlit_room
      southwest: magnetic_hall
      path: ambush_trail
      cave: sun_moon_cave
      silk: silk_yard
    objects:
      iron_sword: 1
  dig_peak:
    name: 白玉峰坡
    aliases:
    - 峰顶
    long: 陡峭的白玉岩壁，似乎可以挖出一条临时通道。南面回到峰脚。
    outdoors: true
    exits:
      south: dig_base
    hooks:
      hook_id: dig_collapse
      params:
        direction: north
        target: dig_cave
        ttl_ticks: 3
  dig_cave:
    name: 临时洞府
    long: 刚刚挖出的狭小石洞，岩壁不稳，随时可能塌陷。
    exits:
      south:
        to: dig_peak
        aliases:
        - 出口
  fork_hub:
    name: 岔路口
    aliases:
    - 岔路
    long: 小路在此分岔，北面通向未知，西面回到峰脚。
    outdoors: true
    exits:
      west: dig_base
      north:
        random_of:
        - fork_left
        - fork_right
  fork_left:
    name: 左岔小路
    long: 岔路左侧一条安静的小径，尽头是空地。
    outdoors: true
    exits:
      south: fork_hub
  fork_right:
    name: 右岔小路
    long: 岔路右侧一条绕石的小径，尽头是空地。
    outdoors: true
    exits:
      south: fork_hub
  jade_gate:
    name: 玉石甬道
    aliases:
    - 玉路
    - 甬道
    long: 甬道尽头是厚重石门，门环锈迹斑斑，一把斧头插在环中。
    exits:
      east: dig_base
    hooks:
      hook_id: multi_step_gate
      params:
        direction: north
        target: jade_chamber
  jade_chamber:
    name: 玉室
    long: 推开石门后的小室，壁面温润如玉。
    exits:
      south: jade_gate
  desert_maze:
    name: 大沙漠
    aliases:
    - 沙漠
    long: 一望无际的沙海，四周景色几乎相同。南面似有边缘，但很容易迷失方向。
    outdoors: true
    exits:
      north: dig_base
      south: desert_edge
    hooks:
      hook_id: lost_in_maze
      params:
        required_steps: 3
        escape_target: desert_edge
  desert_edge:
    name: 沙漠边缘
    aliases:
    - 边缘
    long: 沙海尽头，足迹终于清晰起来。
    outdoors: true
    exits:
      north: desert_maze
  cliff_edge:
    name: 峭壁边
    aliases:
    - 峭壁
    long: 深涧横亘面前，地势稍高，或许可以纵身一跃。
    outdoors: true
    exits:
      southwest: dig_base
    hooks:
      hook_id: skill_gate
      params:
        verb: jump
        skill_id: dodge
        min_level: 50
        direction: north
        target: cliff_far
  cliff_far:
    name: 涧对岸
    long: 跳过深涧后的平台，回望来路令人腿软。
    outdoors: true
    exits:
      south: cliff_edge
  cliff_base:
    name: 崖底
    long: 峭壁根部，石缝可攀。西面回到峰脚。
    outdoors: true
    exits:
      west: dig_base
    hooks:
      hook_id: skill_gate
      params:
        verb: climb
        skill_id: dodge
        min_level: 30
        direction: up
        target: cliff_top
  cliff_top:
    name: 崖顶
    long: 攀上崖顶，风声猎猎。
    outdoors: true
    exits:
      down: cliff_base
  sunlit_room:
    name: 日光玉室
    aliases:
    - 玉室
    long: 玉壁通透，日光下隐约可见北方一道缝隙。
    exits:
      southeast: dig_base
      north: secret_tunnel
    hooks:
      hook_id: time_of_day_passage
      params:
        direction: north
        when: day
  secret_tunnel:
    name: 秘道
    long: 日光照入时才显现的窄道，尽头通向未知。
    exits:
      south: sunlit_room
  magnetic_hall:
    name: 磁力玉厅
    long: 厅中隐有异力，铁器入内恐被吸住。
    exits:
      northeast: dig_base
    hooks:
      hook_id: magnetic_iron
      params:
        tag: iron
  ambush_trail:
    name: 山脚小径
    aliases:
    - 小径
    - 山脚
    long: 荒僻小径，常有劫匪出没。北面通向深处，南面回到峰脚。
    outdoors: true
    exits:
      south: dig_base
      north: ambush_end
    block_exits:
      north:
        npc: road_bandit
    objects:
      road_bandit: 0
    hooks:
      hook_id: bandit_ambush
      params:
        npc: road_bandit
        # C12：背包非货币物品价值门槛（与峰脚铁剑 value 对齐；无贵重物不刷）
        min_item_value: 100
  ambush_end:
    name: 小径尽头
    aliases:
    - 深处
    long: 劫匪拦路之后才能到达的空地。
    outdoors: true
    exits:
      south: ambush_trail
  sun_moon_cave:
    name: 日月洞
    aliases:
    - 洞穴
    long: 洞口阴冷，似有杀令张挂。南面回到峰脚。
    exits:
      south: dig_base
    objects:
      cave_guard: 1
    hooks:
      hook_id: kill_order
      params:
        faction: shaolin
        npc: cave_guard
  silk_yard:
    name: 柔丝庭院
    aliases:
    - 柔丝
    - 庭院
    long: 庭院中央悬着蛛网般的柔丝，北面是幽暗的柔丝室。西面回到峰脚。
    exits:
      west: dig_base
      north: silk_prison
  silk_prison:
    name: 柔丝室
    aliases:
    - 密室
    long: 密闭石室，四壁缠满柔丝，被擒者往往困于此处。
    exits:
      south: silk_yard
factions:
  shaolin:
    display_name: 少林
    skill_pool: []
skills:
  dodge:
    type: martial
    level_req: 0
  silk_rope:
    type: martial
    level_req: 0
    moves:
    - name: 柔丝索
      force: 40
      dodge: 0
      damage_type: blunt
      damage: 1
items:
  iron_sword:
    name: 铁剑
    aliases:
    - 剑
    short: 一把铁剑
    long: 普通铁剑，入玉厅恐被磁力所吸。
    value: 100
    tags:
    - iron
npcs:
  road_bandit:
    name: 劫匪
    aliases:
    - 强盗
    short: 拦路劫匪
    long: 一伙凶神恶煞的劫匪，挡住了北去的路。
    respawn: false
    vitals:
      qi_current: 40
      qi_max: 40
      neili_current: 0
      neili_max: 0
      jingli_current: 10
      jingli_max: 10
  cave_guard:
    name: 洞卫
    aliases:
    - 守卫
    short: 日月洞守卫
    long: 洞口守卫，对特定门派杀气腾腾。
    respawn: false
    vitals:
      qi_current: 50
      qi_max: 50
      neili_current: 0
      neili_max: 0
      jingli_current: 10
      jingli_max: 10
player:
  name: 试炼者
  start_room: dig_base
  faction: shaolin
  skills:
    dodge: 50
    silk_rope: 1
  vitals:
    qi: 100
    qi_max: 100
    neili: 50
    neili_max: 50
    jingli: 50
    jingli_max: 50
