rooms:
  start_yard:
    name: 起始庭院
    long: 一片空荡荡的庭院，只搭了最基本的骨架，等待后续题材内容填充。
    outdoors: true
    exits:
      north: corridor
      south:
        to: storage_room
        door: closed
    objects:
      stone: 1
      stone_guard: 1
      yard_gossip: 1
      night_owl: 1
      patrol_pair: 2
  corridor:
    name: 长廊
    aliases:
    - 北道
    long: 一条连接南北两侧的长廊，两侧墙壁空无一物。
    exits:
      south: start_yard
      north:
        to: quiet_room
        door: locked
        key: iron_key
    objects:
      iron_key: 1
  quiet_room:
    name: 静室
    long: 一间安静的房间，位于长廊的尽头。
  storage_room:
    name: 储藏室
    long: 一间堆放杂物的小储藏室，光线昏暗。
    exits:
      north: start_yard
    objects:
      wooden_box: 1
      copper_coins_a: 1
      copper_coins_b: 1
      gem: 1
      small_pouch: 1
      heavy_crate: 1
      quest_token: 1
      stone_tablet: 1
items:
  stone:
    name: 石头
    aliases:
    - 石
    short: 一块灰扑扑的石头
    long: 一块毫不起眼的石头，沉甸甸的，表面粗糙。
  iron_key:
    name: 铁钥匙
    aliases:
    - 钥匙
    short: 一把铁钥匙
    long: 一把锈迹斑斑的铁钥匙，齿纹独特。
  wooden_box:
    name: 木箱
    aliases:
    - 箱子
    short: 一只旧木箱
    long: 一只能开合的旧木箱，里面可以塞杂物。
    container:
      max_capacity: 2
  copper_coins_a:
    name: 铜钱
    aliases:
    - 钱
    short: 一堆铜钱
    long: 圆圆的铜钱，可以堆叠。
    stackable:
      amount: 5
      unit_weight: 0.1
    value: 1
  copper_coins_b:
    name: 铜钱
    aliases:
    - 钱
    short: 一堆铜钱
    long: 圆圆的铜钱，可以堆叠。
    stackable:
      amount: 3
      unit_weight: 0.1
    value: 1
  gem:
    name: 宝石
    aliases:
    - 玉
    short: 一颗宝石
    long: 一颗透亮的宝石，体积不大。
    weight: 0.5
    value: 50
  small_pouch:
    name: 小布袋
    aliases:
    - 布袋
    - 袋子
    short: 一只小布袋
    long: 一只只能装一件轻物的小布袋。
    container:
      max_capacity: 1
      max_weight: 1.0
  heavy_crate:
    name: 大石块
    aliases:
    - 大石
    short: 一块沉重的大石
    long: 一块沉甸甸的大石，勉强能搬，但塞不进小布袋。
    weight: 5
  quest_token:
    name: 令牌
    aliases:
    - 牌
    short: 一枚令牌
    long: 一枚刻着奇怪纹样的令牌，似乎不能随意丢弃。
    no_drop: true
    no_drop_message: 这是任务物品，不能丢弃。
  stone_tablet:
    name: 石碑
    aliases:
    - 碑
    short: 一块石碑
    long: 一块嵌在地上的石碑，纹丝不动。
    no_get: true
npcs:
  stone_guard:
    name: 石像守卫
    aliases:
    - 守卫
    - 石像
    short: 一尊石像守卫
    long: 一尊沉默的石像守卫，矗立在庭院一角，纹丝不动。
    inquiry:
      天气: 石像沉默不语，庭院上空一片晴朗。
      default: 石像守卫纹丝不动，没有回答。
  yard_gossip:
    name: 庭院闲人
    aliases:
    - 闲人
    short: 一个爱说话的闲人
    long: 一个在庭院里踱步闲聊的人，嘴里总念叨着什么。
    behaviors:
    - kind: chatter
      chat_msgs:
      - 庭院真清静啊。
      chat_chance: 0.05
  night_owl:
    name: 夜猫子
    aliases:
    - 夜猫
    short: 一个昼伏夜出的人
    long: 此人白天打瞌睡，夜里才精神。
    behaviors:
    - kind: chatter
      chat_msgs:
      - 夜深了，该歇歇了。
      chat_chance: 1.0
      when:
        predicate: is_night
  patrol_pair:
    name: 巡逻兵
    aliases:
    - 兵
    short: 一名巡逻兵
    long: 负责庭院巡逻的士兵。
    respawn: true
player:
  name: 你
  start_room: start_yard
nature:
  day_phases:
  - name: dawn
    length: 240
    time_msg: 东方的天空中开始出现一丝微曦。
    desc_msg: 东方的天空已逐渐发白。
    rain_desc_msg: 东方微曦，细雨蒙蒙。
  - name: day
    length: 720
    time_msg: 天光大亮。
    desc_msg: 日正当空，天色晴朗。
    rain_desc_msg: 白天，下着小雨。
  - name: dusk
    length: 240
    time_msg: 天色渐渐暗了下来。
    desc_msg: 夕阳西下，暮色四合。
    rain_desc_msg: 黄昏时分，细雨连绵。
  - name: night
    length: 240
    time_msg: 夜幕降临了。
    desc_msg: 夜深了，四下一片寂静。
    rain_desc_msg: 夜雨潇潇，四野寂然。
